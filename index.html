<script>
let currentPage = 1;
const questionsPerPage = 30;
let allQuestions = [];

async function loadTest() {
    const response = await fetch('test.txt');
    const text = await response.text();

    allQuestions = text.split('~~').filter(q => q.trim());

    renderPage(currentPage);
    renderPagination();
}

function renderPage(page) {
    const quizDiv = document.getElementById('quiz');
    quizDiv.innerHTML = '';

    const start = (page - 1) * questionsPerPage;
    const end = page * questionsPerPage;
    const pageQuestions = allQuestions.slice(start, end);

    pageQuestions.forEach((block, index) => {
        const lines = block.split('\n')
            .map(l => l.trim())
            .filter(l => l);

        const question = lines[0];

        const variants = lines.slice(1, -1).map(l =>
            l.replace('@@', '').trim()
        );

        const answerLine = lines[lines.length - 1];
        const match = answerLine.match(/\{@([A-Z])@\}/);
        const correctLetter = match ? match[1] : 'A';

        const correctIndexOriginal = correctLetter.charCodeAt(0) - 65;
        const correctVariant = variants[correctIndexOriginal];

        const shuffled = shuffle([...variants]);
        const correctIndex = shuffled.indexOf(correctVariant);

        const qIndex = start + index;

        const qDiv = document.createElement('div');
        qDiv.className = 'question';
        qDiv.id = `q${qIndex}`;

        const qText = document.createElement('p');
        qText.textContent = `${qIndex + 1}. ${question}`;
        qDiv.appendChild(qText);

        const labels = ['A','B','C','D','E'];
        const result = document.createElement('div');
        result.id = `result${qIndex}`;

        shuffled.forEach((v, i) => {
            const label = document.createElement('label');
            label.className = 'variant';

            const input = document.createElement('input');
            input.type = 'radio';
            input.name = `q${qIndex}`;
            input.value = i;

            input.onclick = () => {
                checkAnswer(qIndex, i === correctIndex);
            };

            label.appendChild(input);
            label.innerHTML += ` ${labels[i]}. ${v}`;

            if (i === correctIndex) {
                label.dataset.correct = true;
            }

            qDiv.appendChild(label);
        });

        qDiv.appendChild(result);
        quizDiv.appendChild(qDiv);
    });
}

function checkAnswer(index, isCorrect) {
    const result = document.getElementById(`result${index}`);

    if (isCorrect) {
        result.textContent = 'Дұрыс ✅';
        result.className = 'correct';
    } else {
        result.textContent = 'Қате ❌';
        result.className = 'incorrect';
    }
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// 🔥 перемешивание ВСЕХ вопросов
function shuffleQuestions() {
    allQuestions = shuffle(allQuestions);
    currentPage = 1;
    renderPage(currentPage);
    renderPagination();
}

// 🔥 перемешивание ТОЛЬКО текущей страницы
function shuffleCurrentPageVariants() {
    renderPage(currentPage);
}

function renderPagination() {
    const div = document.getElementById('pagination');
    div.innerHTML = '';

    const pages = Math.ceil(allQuestions.length / questionsPerPage);

    for (let i = 1; i <= pages; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;

        if (i === currentPage) btn.classList.add('active');

        btn.onclick = () => {
            currentPage = i;
            renderPage(i);
            renderPagination();
        };

        div.appendChild(btn);
    }
}

function showCorrectAnswers() {
    document.querySelectorAll('[data-correct="true"]').forEach(el => {
        el.classList.add('correct-answer');
    });
}

function resetAll() {
    loadTest();
}

loadTest();
</script>
