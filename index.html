<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест жүйесі</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .question { margin-bottom: 20px; }
        .variant { display: block; margin-bottom: 5px; cursor: pointer; }
        .question-result { font-weight: bold; margin-top: 10px; }
        .correct { color: green; }
        .incorrect { color: red; }
        .pagination { margin-top: 20px; text-align: center; }
        .pagination button { margin: 5px; padding: 10px; }
        .pagination button.active {
            background-color: #007bff;
            color: white;
        }
        .correct-answer { font-weight: bold; color: green; }
    </style>
</head>
<body>

<h1>Тест</h1>

<button onclick="shuffleQuestions()">Араластыру</button>
<button onclick="showCorrectAnswers()">Дұрыс жауаптарды көрсету</button>
<button onclick="resetAll()">Қайта бастау</button>

<div id="quiz"></div>
<div class="pagination" id="pagination"></div>

<script>
let currentPage = 1;
const questionsPerPage = 30;
let allQuestions = [];

async function loadTest() {
    const response = await fetch('test.txt');
    const text = await response.text();

    allQuestions = text.split('~~').filter(q => q.trim());

    renderPage(currentPage);
    renderPagination();
}

function renderPage(page) {
    const quizDiv = document.getElementById('quiz');
    quizDiv.innerHTML = '';

    const start = (page - 1) * questionsPerPage;
    const end = page * questionsPerPage;
    const pageQuestions = allQuestions.slice(start, end);

    pageQuestions.forEach((block, index) => {
        const lines = block.split('\n')
            .map(l => l.trim())
            .filter(l => l);

        if (lines.length < 2) return;

        const question = lines[0];

        // варианты (без последней строки)
        const variants = lines.slice(1, -1).map(l =>
            l.replace('@@', '').trim()
        );

        // строка с ответом
        const answerLine = lines[lines.length - 1];

        const match = answerLine.match(/\{@([A-Z])@\}/);
        const correctLetter = match ? match[1] : 'A';

        const correctIndexOriginal = correctLetter.charCodeAt(0) - 65;
        const correctVariant = variants[correctIndexOriginal];

        const shuffled = shuffle([...variants]);
        const correctIndex = shuffled.indexOf(correctVariant);

        const qDiv = document.createElement('div');
        qDiv.className = 'question';
        qDiv.id = `q${start + index}`;

        const qText = document.createElement('p');
        qText.textContent = `${start + index + 1}. ${question}`;
        qDiv.appendChild(qText);

        const labels = ['A','B','C','D','E'];

        shuffled.forEach((v, i) => {
            const label = document.createElement('label');
            label.className = 'variant';

            label.innerHTML = `
                <input type="radio" name="q${start + index}" value="${i === correctIndex}">
                ${labels[i]}. ${v}
            `;

            if (i === correctIndex) {
                label.dataset.correct = true;
            }

            qDiv.appendChild(label);
        });

        const btn = document.createElement('button');
        btn.textContent = 'Тексеру';
        btn.onclick = () => checkAnswer(start + index);

        const result = document.createElement('div');
        result.id = `result${start + index}`;

        qDiv.appendChild(btn);
        qDiv.appendChild(result);

        quizDiv.appendChild(qDiv);
    });
}

function checkAnswer(i) {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    const result = document.getElementById(`result${i}`);

    if (!selected) {
        result.textContent = 'Жауап таңдаңыз!';
        result.style.color = 'orange';
        return;
    }

    if (selected.value === "true") {
        result.textContent = 'Дұрыс ✅';
        result.className = 'correct';
    } else {
        result.textContent = 'Қате ❌';
        result.className = 'incorrect';
    }
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function renderPagination() {
    const div = document.getElementById('pagination');
    div.innerHTML = '';

    const pages = Math.ceil(allQuestions.length / questionsPerPage);

    for (let i = 1; i <= pages; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;

        if (i === currentPage) btn.classList.add('active');

        btn.onclick = () => {
            currentPage = i;
            renderPage(i);
            renderPagination();
        };

        div.appendChild(btn);
    }
}

function shuffleQuestions() {
    allQuestions = shuffle(allQuestions);
    renderPage(1);
}

function showCorrectAnswers() {
    document.querySelectorAll('[data-correct="true"]').forEach(el => {
        el.classList.add('correct-answer');
    });
}

function resetAll() {
    loadTest();
}

loadTest();
</script>

</body>
</html>
