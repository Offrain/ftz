<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест жүйесі</title>

<style>
body {
    font-family: Arial;
    margin: 20px;
}

.question {
    margin-bottom: 25px;
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

.variant {
    display: block;
    margin: 5px 0;
    cursor: pointer;
}

.correct { color: green; }
.incorrect { color: red; }

.pagination button {
    margin: 5px;
}

.active {
    background: blue;
    color: white;
}

pre {
    white-space: pre-line;
}
</style>
</head>

<body>

<h1>Тест</h1>

<button onclick="shuffleQuestions()">Барлық сұрақтарды араластыру</button>
<button onclick="shuffleCurrentPage()">Осы беттегі сұрақтарды араластыру</button>
<button onclick="resetAll()">Қайта бастау</button>

<div id="quiz"></div>
<div id="pagination"></div>

<script>

let currentPage = 1;
const questionsPerPage = 30;
let allQuestions = [];

async function loadTest() {
    const response = await fetch('test.txt');
    const text = await response.text();

    allQuestions = text
        .split('~~')
        .map(q => q.trim())
        .filter(q => q.length > 0);

    renderPage(currentPage);
    renderPagination();
}

function renderPage(page) {
    const quiz = document.getElementById('quiz');
    quiz.innerHTML = '';

    const start = (page - 1) * questionsPerPage;
    const end = page * questionsPerPage;

    const pageQuestions = allQuestions.slice(start, end);

    pageQuestions.forEach((block, index) => {

        // 🔥 достаем правильный ответ отдельно
        const answerMatch = block.match(/\{@([A-Z])@\}/);
        const correctLetter = answerMatch ? answerMatch[1] : 'A';

        // убираем ответ из текста
        const cleanBlock = block.replace(/\{@[A-Z]@\}/, '');

        // режем вопрос и варианты
        const parts = cleanBlock
            .split('@@')
            .map(p => p.trim())
            .filter(p => p.length > 0);

        const question = parts[0];
        const variants = parts.slice(1);

        const correctIndex = correctLetter.charCodeAt(0) - 65;
        const correctVariant = variants[correctIndex];

        const shuffled = shuffle([...variants]);

        const qIndex = start + index;

        const div = document.createElement('div');
        div.className = 'question';

        const p = document.createElement('p');

        // 🔥 сохраняем формат столбцов
        p.style.whiteSpace = 'pre-line';
        p.textContent = (qIndex + 1) + '. ' + question;

        div.appendChild(p);

        const result = document.createElement('div');
        result.id = 'result' + qIndex;

        shuffled.forEach((v) => {

            const label = document.createElement('label');
            label.className = 'variant';

            const input = document.createElement('input');
            input.type = 'radio';
            input.name = 'q' + qIndex;

            input.addEventListener('change', () => {

                checkAnswer(qIndex, v, correctVariant);

                document.querySelectorAll(`input[name="q${qIndex}"]`)
                    .forEach(el => el.disabled = true);
            });

            label.appendChild(input);
            label.appendChild(document.createTextNode(' ' + v));

            div.appendChild(label);
        });

        div.appendChild(result);
        quiz.appendChild(div);
    });
}

function checkAnswer(qIndex, selected, correct) {
    const result = document.getElementById('result' + qIndex);

    if (selected === correct) {
        result.textContent = 'Дұрыс ✅';
        result.className = 'correct';
    } else {
        result.innerHTML = `
            Қате ❌<br>
            Дұрыс жауап: <b>${correct}</b>
        `;
        result.className = 'incorrect';
    }
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function shuffleQuestions() {
    allQuestions = shuffle([...allQuestions]);
    currentPage = 1;
    renderPage(currentPage);
    renderPagination();
}

function shuffleCurrentPage() {
    const start = (currentPage - 1) * questionsPerPage;
    const end = start + questionsPerPage;

    const part = allQuestions.slice(start, end);
    const shuffled = shuffle([...part]);

    for (let i = 0; i < shuffled.length; i++) {
        allQuestions[start + i] = shuffled[i];
    }

    renderPage(currentPage);
}

function renderPagination() {
    const div = document.getElementById('pagination');
    div.innerHTML = '';

    const pages = Math.ceil(allQuestions.length / questionsPerPage);

    for (let i = 1; i <= pages; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;

        if (i === currentPage) btn.classList.add('active');

        btn.onclick = () => {
            currentPage = i;
            renderPage(i);
            renderPagination();
        };

        div.appendChild(btn);
    }
}

function resetAll() {
    loadTest();
}

loadTest();

</script>

</body>
</html>
